//First example incresing the font size.
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>font size incresing using js</title>
</head>
<body style="font-family: Helvetica, Arial, sans-serif;font-size: 12px;">
    <h1 style="font-size: 1.5em;"> h1 Hello world</h1>
    <h2 style="font-size: 1.4em;"> h2 Hello world</h2>
    <!-- creatinting buttons for font size increasing -->
    <button id="size-12">12</button>
    <button id="size-14">14</button>
    <button id="size-16">16</button>

    <!-- //scripts for font size increasing -->
    <script>
        
        function makesize(size){
            return function(){
                document.body.style.fontSize = size + 'px';
            };
        }
        const size12 = makesize(12);
        const size14 = makesize(14);
        const size16 = makesize(16);
        
        document.getElementById("size-12").onclick = size12;
        document.getElementById("size-14").onclick = size14;
        document.getElementById("size-16").onclick = size16;
        </script>

</body>
</html>
